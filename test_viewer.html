<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple STL Viewer Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #333;
        }
        
        #viewer-container {
            width: 100%;
            height: 500px;
            background: #ffffff;
            border: 2px solid #ddd;
            border-radius: 8px;
            position: relative;
            margin: 20px 0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Simple STL Viewer Test</h1>
        
        <div id="viewer-container">
            <div class="loading" id="loading">
                <div>⏳ Loading 3D model...</div>
            </div>
        </div>
        
        <div class="controls">
            <p><strong>Controls:</strong> Left click + drag to rotate, scroll to zoom, right click + drag to pan</p>
        </div>
        
        <div id="status"></div>
    </div>

    <!-- Three.js and loaders -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/STLLoader.js"></script>
    
    <script>
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<div class="${type}">${message}</div>`;
        }
        
        function initViewer() {
            const container = document.getElementById('viewer-container');
            const loading = document.getElementById('loading');
            
            try {
                // Create scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf5f5f5);
                
                // Create camera
                const camera = new THREE.PerspectiveCamera(
                    75,
                    container.clientWidth / container.clientHeight,
                    0.1,
                    1000
                );
                
                // Create renderer
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Add lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 10, 5);
                directionalLight.castShadow = true;
                scene.add(directionalLight);
                
                // Add controls
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                
                // Load STL
                const loader = new THREE.STLLoader();
                const stlPath = './stl_models/AAPL_badge.stl';
                
                console.log('Loading STL from:', stlPath);
                showStatus('Loading STL file...', 'info');
                
                loader.load(
                    stlPath,
                    function(geometry) {
                        console.log('STL loaded successfully');
                        showStatus('STL loaded successfully! 🎉', 'success');
                        
                        // Create material
                        const material = new THREE.MeshPhongMaterial({
                            color: 0x4285f4,
                            shininess: 100
                        });
                        
                        // Create mesh
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        
                        // Center the model
                        geometry.computeBoundingBox();
                        const box = geometry.boundingBox;
                        const center = box.getCenter(new THREE.Vector3());
                        geometry.translate(-center.x, -center.y, -center.z);
                        
                        // Scale to fit viewport
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 100 / maxDim; // Scale to fit in viewport
                        mesh.scale.setScalar(scale);
                        
                        scene.add(mesh);
                        
                        // Position camera
                        camera.position.set(50, 50, 50);
                        camera.lookAt(0, 0, 0);
                        
                        // Hide loading and show renderer
                        loading.style.display = 'none';
                        container.appendChild(renderer.domElement);
                        
                        // Animation loop
                        function animate() {
                            requestAnimationFrame(animate);
                            controls.update();
                            renderer.render(scene, camera);
                        }
                        animate();
                        
                        // Handle window resize
                        window.addEventListener('resize', function() {
                            camera.aspect = container.clientWidth / container.clientHeight;
                            camera.updateProjectionMatrix();
                            renderer.setSize(container.clientWidth, container.clientHeight);
                        });
                        
                        console.log('3D viewer initialized successfully');
                    },
                    function(progress) {
                        console.log('Loading progress:', progress);
                    },
                    function(error) {
                        console.error('Error loading STL:', error);
                        showStatus('❌ Error loading STL file: ' + error.message, 'error');
                        loading.innerHTML = '<div>❌ Failed to load STL file</div>';
                    }
                );
                
            } catch (error) {
                console.error('Error initializing viewer:', error);
                showStatus('❌ Error initializing 3D viewer: ' + error.message, 'error');
                loading.innerHTML = '<div>❌ Failed to initialize viewer</div>';
            }
        }
        
        // Initialize when page loads
        window.addEventListener('load', function() {
            console.log('Page loaded, initializing viewer...');
            initViewer();
        });
    </script>
</body>
</html>
